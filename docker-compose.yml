version: '3.9'

services:

  db:
    image: postgres:16-alpine
    container_name: taskflow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: taskflow
      POSTGRES_PASSWORD: taskflow
      POSTGRES_DB: taskflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskflow-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 5000
      DATABASE_URL: postgres://taskflow:taskflow@db:5432/taskflow
      JWT_SECRET: verander_dit_naar_een_echt_geheim
      CLIENT_URL: http://localhost:3000
      NODE_ENV: development
    ports:
      - "5000:5000"
    volumes:
      # Hot reload: mount source, maar node_modules uit container bewaren
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taskflow-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      # Hot reload: mount source, maar node_modules uit container bewaren
      - ./frontend:/app
      - /app/node_modules
    stdin_open: true   # Nodig voor CRA hot reload

volumes:
  pgdata:
