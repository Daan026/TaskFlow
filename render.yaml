services:
  - type: web
  name: taskflow-backend
  runtime: node
  rootDir: backend
  buildCommand: npm install
  startCommand: node server.js
envVars:
  - key: DATABASE_URL
    sync: false
  - key: JWT_SECRET
    sync: false
  - key: CLIENT_URL
    sync: false
  - key: NODE_ENV
    value: production
